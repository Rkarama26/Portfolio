<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact</title>
  <link rel="stylesheet" href="contact.css">
</head>

<body>



  <div class="background">
    <div class="container">
      <div class="screen">
        <div class="screen-header">
          <div class="screen-header-left">
            <div class="screen-header-button close"></div>
            <div class="screen-header-button maximize"></div>
            <div class="screen-header-button minimize"></div>
          </div>

        </div>
        <div class="screen-body">
          <div class="screen-body-item left">
            <div class="app-title">
              <span>CONTACT</span>
              <span>ME</span>
            </div>
            <div class="app-contact">CONTACT INFO : rohit.karma026@gmail.com</div>
          </div>
          <div class="screen-body-item">
            <div class="app-form">
              <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="90237274-32c7-44f6-8e8d-fcbc158ff897">

                <!-- Other HTML code -->

                <div class="app-form-group">
                  <input class="app-form-control" name="name" placeholder="NAME">
                </div>
                <div class="app-form-group">
                  <input class="app-form-control" name="email" placeholder="EMAIL">
                </div>
                <div class="app-form-group message">
                  <input class="app-form-control" name="message" placeholder="MESSAGE">
                </div>
                <div class="app-form-group buttons">
                  <button class="app-form-button">CANCEL</button>
                  <button class="app-form-button">SEND</button>
                </div>
              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </form>




</body>

</html>
